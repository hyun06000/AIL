name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test reference implementation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install reference implementation
        working-directory: reference-impl
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: reference-impl
        run: pytest tests/ -v

      - name: Smoke-test examples (mock adapter)
        working-directory: reference-impl
        run: |
          python -m ail_mvp.cli parse examples/hello.ail
          python -m ail_mvp.cli run examples/hello.ail --input "world" --mock
          python -m ail_mvp.cli run examples/translate.ail --input "hello" --mock
          python -m ail_mvp.cli run examples/ask_human.ail --input "I am tired" --mock || true
