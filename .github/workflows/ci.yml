name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test reference implementation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install reference implementation (with anthropic optional)
        working-directory: reference-impl
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic]"

      - name: Run tests
        working-directory: reference-impl
        run: pytest tests/ -v

      - name: Smoke-test examples (mock adapter)
        working-directory: reference-impl
        run: |
          python -m ail.cli parse examples/hello.ail
          python -m ail.cli parse examples/classify.ail
          python -m ail.cli parse examples/evolve_retune.ail
          python -m ail.cli run examples/hello.ail --input "world" --mock
          python -m ail.cli run examples/translate.ail --input "hello" --mock
          python -m ail.cli run examples/classify.ail --input "I love it" --mock
          python -m ail.cli run examples/evolve_retune.ail --input "great" --mock
          python -m ail.cli run examples/ask_human.ail --input "I am tired" --mock || true

      - name: Run evolve demo (deterministic harness)
        working-directory: reference-impl
        run: python tools/evolve_demo.py

  conformance:
    name: Cross-runtime conformance (Python ↔ Go)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install reference implementation
        working-directory: reference-impl
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Go interpreter
        working-directory: go-impl
        run: go build -o ail-go .

      - name: Run conformance suite
        # Drives every case under reference-impl/tests/conformance/cases
        # through BOTH runtimes and asserts byte-identical output.
        # A failure here means the two implementations diverge on some
        # program — which by the spec rule means one of them has a bug,
        # or the spec itself is ambiguous and needs tightening.
        working-directory: reference-impl
        run: pytest tests/conformance -v

  live-test:
    name: Live-test against Claude API
    runs-on: ubuntu-latest
    # Only runs if the repository has an ANTHROPIC_API_KEY secret
    # configured AND the push is to main (not PRs from forks, which
    # would otherwise leak the secret).
    if: github.event_name == 'push' && github.repository_owner == 'hyun06000'
    needs: test
    continue-on-error: true   # don't block main on a transient API blip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reference implementation
        working-directory: reference-impl
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic]"

      - name: Run live harness
        working-directory: reference-impl
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY secret configured; skipping live test."
            exit 0
          fi
          # Skip ask_human (needs stdin) for the CI run
          python tools/run_live.py --only hello
          python tools/run_live.py --only translate
          python tools/run_live.py --only classify

