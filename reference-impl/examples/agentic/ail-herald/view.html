<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ail-herald</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
           "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
           max-width: 640px; margin: 0 auto; padding: 32px 24px 80px;
           color: #111; background: #fafafa; line-height: 1.55; }
    h1 { font-size: 20px; margin: 0 0 4px 0; letter-spacing: -0.01em; }
    .tag { color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    .msg { white-space: pre-wrap; word-break: keep-all; padding: 16px 18px;
           background: #fff; border: 1px solid #e5e7eb;
           border-radius: 10px; margin-bottom: 12px; font-size: 15px; }
    .draft { white-space: pre-wrap; font-family: ui-monospace,
             SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px;
             padding: 14px; background: #f3f4f6; border-radius: 8px;
             margin-bottom: 12px; color: #111; }
    .actions { display: flex; flex-direction: column; gap: 8px;
               margin-bottom: 16px; }
    button { font-family: inherit; font-size: 14px; text-align: left;
             padding: 12px 16px; border-radius: 8px; border: 1px solid
             #e5e7eb; background: #fff; color: #111; cursor: pointer;
             transition: background 0.1s; }
    button:hover { background: #f3f4f6; }
    button.primary { background: #111; color: #fff; border: 0; }
    button.primary:hover { opacity: 0.9; background: #111; }
    button:disabled { opacity: 0.5; cursor: wait; }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] { flex: 1; font-family: inherit; font-size: 14px;
                         padding: 12px 14px; border: 1px solid #e5e7eb;
                         border-radius: 8px; background: #fff; }
    input[type="text"]:focus { outline: 2px solid #111; outline-offset: -1px; }
    .tag-code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                background: #f3f4f6; padding: 1px 6px; border-radius: 4px;
                font-size: 13px; }
    #app > * { opacity: 0; animation: fade 0.15s ease-out forwards; }
    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <h1>ail-herald</h1>
  <div class="tag">AIL and HEAAL promoted by an agent written in AIL.</div>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');

    async function send(body) {
      app.innerHTML = '<div class="msg" style="color:#6b7280;">…</div>';
      try {
        const r = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain; charset=utf-8' },
          body,
        });
        const text = await r.text();
        let pairs;
        try {
          pairs = JSON.parse(text);
        } catch (e) {
          renderError("서버 응답을 읽을 수 없어요.\n\n" + text);
          return;
        }
        if (!Array.isArray(pairs)) {
          renderError("예상치 못한 응답 형식: " + text.slice(0, 200));
          return;
        }
        render(pairs);
      } catch (e) {
        renderError("네트워크 오류: " + e.message);
      }
    }

    function renderError(msg) {
      app.innerHTML = '';
      const d = document.createElement('div');
      d.className = 'msg';
      d.style.color = '#b91c1c';
      d.style.background = '#fef2f2';
      d.style.borderColor = '#fecaca';
      d.textContent = msg;
      app.appendChild(d);
    }

    function render(pairs) {
      app.innerHTML = '';
      const actions = [];
      let inputSpec = null;

      pairs.forEach(([key, value]) => {
        if (key === 'message') {
          const d = document.createElement('div');
          d.className = 'msg';
          d.textContent = value;
          app.appendChild(d);
        } else if (key === 'draft') {
          const d = document.createElement('div');
          d.className = 'draft';
          d.textContent = value || '(빈 초안)';
          app.appendChild(d);
        } else if (key === 'action') {
          actions.push(value);
        } else if (key === 'input') {
          inputSpec = value;
        }
      });

      if (actions.length) {
        const box = document.createElement('div');
        box.className = 'actions';
        actions.forEach((spec, idx) => {
          const [label, input] = splitOnce(spec, '|');
          const btn = document.createElement('button');
          btn.textContent = label;
          if (idx === 0 && !spec.startsWith('←')) btn.className = 'primary';
          btn.onclick = () => send(input);
          box.appendChild(btn);
        });
        app.appendChild(box);
      }

      if (inputSpec) {
        const [placeholder, prefix] = splitOnce(inputSpec, '|');
        const row = document.createElement('div');
        row.className = 'input-row';
        const field = document.createElement('input');
        field.type = 'text';
        field.placeholder = placeholder;
        field.autocomplete = 'off';
        field.autocapitalize = 'off';
        field.spellcheck = false;
        const submit = document.createElement('button');
        submit.className = 'primary';
        submit.textContent = '저장';
        const fire = () => {
          const v = field.value.trim();
          if (!v) return;
          send(prefix + v);
        };
        submit.onclick = fire;
        field.onkeydown = (e) => { if (e.key === 'Enter') fire(); };
        row.appendChild(field);
        row.appendChild(submit);
        app.appendChild(row);
        setTimeout(() => field.focus(), 50);
      }
    }

    function splitOnce(s, sep) {
      const i = s.indexOf(sep);
      if (i < 0) return [s, ''];
      return [s.slice(0, i), s.slice(i + 1)];
    }

    // Initial load
    send('');
  </script>
</body>
</html>
